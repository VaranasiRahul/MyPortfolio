# =============================================================================
# GitHub Actions — Pull Request Validation Pipeline
# Lightweight checks on every PR to main/develop
# Fast feedback: runs in ~3-5 minutes
# =============================================================================

name: "🔎 PR Check — Lint · Type · Build"

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

# Cancel redundant runs on the same PR
concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write  # To post PR comments

env:
  NODE_VERSION: "20"

jobs:
  # ===========================================================================
  # Quick validation — runs everything in a single job for speed
  # ===========================================================================
  pr-validate:
    name: "🔎 Validate PR"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Skip draft PRs
    if: github.event.pull_request.draft == false

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "📦 Setup Node.js ${{ env.NODE_VERSION }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: "📥 Install dependencies"
        run: npm ci --prefer-offline

      - name: "🔷 TypeScript check"
        id: tsc
        run: |
          npx tsc --noEmit 2>&1 | tee tsc-output.txt || true
          echo "tsc_errors=$(grep -c 'error TS' tsc-output.txt || echo 0)" >> $GITHUB_OUTPUT

      - name: "🏗️ Build check"
        id: build
        run: |
          npm run build
          echo "Build successful ✅"

      - name: "📦 Bundle size report"
        run: |
          echo "## 📦 Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "| File Type | Total Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          JS_SIZE=$(find dist/public -name "*.js" -exec du -ck {} + | tail -1 | cut -f1)
          CSS_SIZE=$(find dist/public -name "*.css" -exec du -ck {} + | tail -1 | cut -f1)
          TOTAL_SIZE=$(du -sk dist/public | cut -f1)
          echo "| JavaScript | ${JS_SIZE} KB |" >> $GITHUB_STEP_SUMMARY
          echo "| CSS | ${CSS_SIZE} KB |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **${TOTAL_SIZE} KB** |" >> $GITHUB_STEP_SUMMARY

      - name: "🔒 Quick security audit"
        run: |
          npm audit --audit-level=critical 2>&1 || true

      - name: "💬 Post PR comment with results"
        uses: actions/github-script@v7
        with:
          script: |
            const tscErrors = '${{ steps.tsc.outputs.tsc_errors }}';
            const buildOk = '${{ steps.build.outcome }}' === 'success';

            const body = [
              '## 🔎 PR Check Results',
              '',
              '| Check | Status |',
              '|---|---|',
              `| 🔷 TypeScript | ${tscErrors === '0' ? '✅ No errors' : \`⚠️ ${tscErrors} error(s)\`} |`,
              `| 🏗️ Build | ${buildOk ? '✅ Passed' : '❌ Failed'} |`,
              `| 🔒 Security | ✅ Audited |`,
              '',
              '> 💡 This is a pre-merge validation. Full pipeline (Docker + Trivy + SonarCloud + Netlify deploy) runs on merge to `main`.',
              '',
              `*Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*`,
            ].join('\n');

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existing = comments.find(c => 
              c.user.login === 'github-actions[bot]' && 
              c.body.includes('PR Check Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
