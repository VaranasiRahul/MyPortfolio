# =============================================================================
# netlify.toml — Netlify Deployment Configuration
# Project: Rahul Varanasi — DevOps Portfolio
# Live URL: https://rahulvaranasi-portfolio.netlify.app
# =============================================================================

# -----------------------------------------------------------------------------
# Build Settings
# -----------------------------------------------------------------------------
[build]
  # Root directory where all commands will run
  base = "."

  # Vite build command
  command = "npm run build"

  # Output directory (matches vite.config.ts outDir)
  publish = "dist/public"

  # Environment variables for build
  [build.environment]
    NODE_VERSION = "20"
    NODE_ENV     = "production"

# -----------------------------------------------------------------------------
# Development Server (for local `netlify dev`)
# -----------------------------------------------------------------------------
[dev]
  command   = "npm run dev"
  port      = 5173
  targetPort = 5173
  publish   = "dist/public"
  autoLaunch = false

# -----------------------------------------------------------------------------
# SPA Redirect — Ensures React Router handles all routes
# Without this, direct URL access like /projects returns 404 on Netlify
# -----------------------------------------------------------------------------
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# -----------------------------------------------------------------------------
# Security Headers — Applied to all responses
# These improve security score and show enterprise-level awareness
# -----------------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"

    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"

    # Enable XSS filter in older browsers
    X-XSS-Protection = "1; mode=block"

    # Control referrer information
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Permissions Policy — disable features not needed
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

    # Content Security Policy
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https: blob:;
      connect-src 'self';
      frame-ancestors 'none';
    """

# -----------------------------------------------------------------------------
# Cache Headers for Static Assets — Immutable long-term caching
# Vite generates hashed filenames so we can cache indefinitely
# -----------------------------------------------------------------------------
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fonts — long cache
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML — must revalidate (so new deploys are picked up)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
