# =============================================================================
# netlify.toml — Netlify Deployment Configuration
# Project: Rahul Varanasi — DevOps Portfolio
# Live URL: https://rahulvaranasi-portfolio.netlify.app
#
# IMPORTANT: This site is deployed via GitHub Actions CI/CD pipeline.
# Netlify's own Git-based builds are disabled (command = "# skip").
# All deployments happen through: .github/workflows/deploy.yml
# =============================================================================

# -----------------------------------------------------------------------------
# Build Settings
# We use GitHub Actions to build and deploy pre-built files via Netlify CLI.
# Netlify's own build is disabled to avoid duplicate/conflicting deployments.
# -----------------------------------------------------------------------------
[build]
  base    = "."
  command = "echo 'Build handled by GitHub Actions — see .github/workflows/deploy.yml'"
  publish = "dist/public"

  [build.environment]
    NODE_VERSION = "20"
    NODE_ENV     = "production"

# -----------------------------------------------------------------------------
# Development Server (for local `netlify dev`)
# -----------------------------------------------------------------------------
[dev]
  command    = "npm run dev"
  port       = 5173
  targetPort = 5173
  publish    = "dist/public"
  autoLaunch = false

# -----------------------------------------------------------------------------
# SPA Redirect — Ensures React Router / wouter handles all routes client-side
# Without this, navigating directly to /projects returns a 404 on Netlify CDN
# -----------------------------------------------------------------------------
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# -----------------------------------------------------------------------------
# Security Headers
# -----------------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' https:; frame-ancestors 'none';"

# -----------------------------------------------------------------------------
# Cache Headers — Vite outputs content-hashed filenames so assets can be
# cached indefinitely. HTML must always revalidate to pick up new deploys.
# -----------------------------------------------------------------------------
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
