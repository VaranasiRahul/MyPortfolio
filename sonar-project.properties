# =============================================================================
# sonar-project.properties — SonarCloud SAST Configuration
# Project: Rahul Varanasi DevOps Portfolio
# Dashboard: https://sonarcloud.io/project/overview?id=VaranasiRahul_MyPortfolio
# =============================================================================

# --- Core Identification ---
sonar.projectKey=VaranasiRahul_MyPortfolio
sonar.organization=rahulvaranasi
sonar.projectName=Rahul Varanasi — DevOps Portfolio
sonar.projectVersion=2.0

# --- Source & Exclusions ---
sonar.sources=client/src
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.test.ts,\
  **/*.spec.ts,\
  **/coverage/**,\
  **/.git/**

# --- TypeScript / JavaScript ---
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# --- Language ---
sonar.language=ts

# --- Encoding ---
sonar.sourceEncoding=UTF-8

# --- Coverage ---
# Uncomment when tests are added:
# sonar.coverageReportPaths=coverage/coverage-final.json

# --- Links ---
sonar.links.homepage=https://rahulvaranasi-portfolio.netlify.app
sonar.links.ci=https://github.com/VaranasiRahul/MyPortfolio/actions
sonar.links.scm=https://github.com/VaranasiRahul/MyPortfolio
